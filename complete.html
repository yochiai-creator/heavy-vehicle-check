{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>保存完了</h2>
  {% if inspection.result == "使用可" %}
    <div class="status-ok">判定：使用可</div>
  {% else %}
    <div class="status-ng">判定：使用不可</div>
    <p>管理者確認まで使用しないでください。</p>
  {% endif %}
  <p>日時：{{ inspection.inspected_at }}</p>
  <p>車両：{{ inspection.vehicle_no }} / {{ inspection.vehicle_name }}</p>
  <a class="btn full" href="/">戻る</a>
</div>
{% endblock %}
