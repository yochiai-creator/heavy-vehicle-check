<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111827">
<title>{{ app_title }}</title>
<link rel="manifest" href="/static/manifest.json">
<style>
*{box-sizing:border-box}body{margin:0;background:#f3f4f6;color:#111827;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding-bottom:82px}header{background:#111827;color:white;padding:18px 14px;position:sticky;top:0;z-index:10}header h1{margin:0;font-size:20px}header p{margin:4px 0 0;color:#d1d5db;font-size:13px}main{max-width:980px;margin:0 auto;padding:14px}.card{background:white;border:1px solid #e5e7eb;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}label{font-weight:700;display:block;margin:12px 0 6px}input,select,textarea{width:100%;padding:13px;border:1px solid #d1d5db;border-radius:12px;font-size:16px;background:white}textarea{min-height:86px}button,.btn{display:inline-block;border:0;border-radius:12px;padding:13px 16px;font-size:16px;font-weight:800;background:#111827;color:white;text-decoration:none;text-align:center;cursor:pointer}.btn-light{background:white;color:#111827;border:1px solid #e5e7eb}.btn-danger{background:#dc2626}.btn-ok{background:#16a34a}.full{width:100%}.muted{color:#6b7280;font-size:13px}.status-ok{background:#dcfce7;color:#166534;padding:12px;border-radius:12px;font-weight:800}.status-ng{background:#fee2e2;color:#991b1b;padding:12px;border-radius:12px;font-weight:800}.flash{padding:12px;border-radius:12px;margin-bottom:10px;font-weight:700}.flash.success{background:#dcfce7;color:#166534}.flash.error{background:#fee2e2;color:#991b1b}table{width:100%;border-collapse:collapse;font-size:14px}th,td{border-bottom:1px solid #e5e7eb;padding:9px;text-align:left;vertical-align:top}.scroll{overflow:auto}.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e5e7eb;display:flex;gap:6px;padding:8px;z-index:20}.bottom-nav a{flex:1;text-align:center;text-decoration:none;background:#f3f4f6;color:#111827;padding:11px 4px;border-radius:14px;font-weight:800;font-size:14px}.qr-img{max-width:220px;width:100%}.photo{max-width:320px;width:100%;border-radius:12px;border:1px solid #e5e7eb}@media print{header,.bottom-nav,.no-print{display:none}body{background:white;padding:0}.card{box-shadow:none;border:1px solid #999}}
</style>
</head>
<body>
<header><h1>🚜 {{ app_title }}</h1><p>QR車両選択 / SQLite保存 / 写真保存 / 管理者確認 / CSV出力</p></header>
<main>
{% with messages=get_flashed_messages(with_categories=true) %}{% if messages %}{% for category,message in messages %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}{% endif %}{% endwith %}
{% block content %}{% endblock %}
</main>
<nav class="bottom-nav no-print"><a href="/">点検</a><a href="/admin">管理</a><a href="/vehicles">車両</a><a href="/qr">QR</a></nav>
</body>
</html>
